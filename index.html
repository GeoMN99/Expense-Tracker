<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container">
        <h1>💰 <span>Expense Tracker</span></h1>

        <!-- Budget Section -->
         <div class="budget-section">
            <div class="budget-input">
                <label>Monthly Budget (KES)</label>
                <input type="number" id="budgetInput" placeholder="Enter your budget.." />
                <button id="setBudgetBtn">Set Budget</button>
            </div>
            <div class="budget-stats">
                <div class="stat-card">
                    <span>Total Budget</span>
                    <h3 id="totalBudget">KES 0</h3>
                </div>
                <div class="stat-card">
                    <span>Total Spent</span>
                    <h3 id="totalSpent">KES 0</h3>
                </div>
                <div class="stat-card">
                    <span>Remaining</span>
                    <h3 id="remaining">KES 0</h3>
                </div>
            </div>
            <div class="progress-bar-container">
                <div id="progressBar" class="progress-bar"></div>
            </div>
            <p id="progressLabel">0% of budget used</p>
         </div>

         <!-- Add Expense Form -->
          <div class="form-section">
            <h2 id="formTitle">➕ Add Expense</h2>
            <div class="form-grid">
                <input type="text" id="expenseName" placeholder="Expense Name" />
                <input type="number" id="expenseAmount" placeholder="Amount (KES)" />
                <select id="expenseCategory">
                    <option value="">Select category</option>
                    <option value="Food">🍔 Food</option>
                    <option value="Transport">🚗 Transport</option>
                    <option value="Entertainment">🎬 Entertainment</option>
                    <option value="Shopping">🛒 Shopping</option>
                    <option value="Health">💊 Health</option>
                    <option value="Bills">💲 Bills</option>
                    <option value="Other">📦 Other</option>
                </select>
                <input type="date" id="expenseDate" />
            </div>
            <div class="form-buttons">
                <button id="addExpenseBtn">Add Expense</button>
                <button id="cancelEditBtn" class="hidden">Cancel</button>
            </div>
            <div id="formError" class="error hidden"></div>
          </div>

          <!-- Filter & Search -->
           <div class="filter-section">
            <input type="text" id="searchInput" placeholder="🔍 Search expenses..." />
            <select id="filterCategory">
                <option value="">All Categories</option>
                <option value="Food">🍔 Food</option>
                    <option value="Transport">🚗 Transport</option>
                    <option value="Entertainment">🎬 Entertainment</option>
                    <option value="Shopping">🛒 Shopping</option>
                    <option value="Health">💊 Health</option>
                    <option value="Bills">💲 Bills</option>
                    <option value="Other">📦 Other</option>
            </select>
            <button id="exportBtn">📥 Export CSV</button>
           </div>

           <!-- Expense List -->
            <div class="expense-list" id="expenseList"></div>
            <p id="noExpenses" class="no-expenses hidden">No expenses yet. Add one above!</p>

            <!-- Chart -->
             <div class="chart-section">
                <h2>📊 Spending by Category</h2>
                <canvas id="expenseChart"></canvas>
             </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
